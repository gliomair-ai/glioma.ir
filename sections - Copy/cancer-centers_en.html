<!-- ============================================================
     🏥 CANCER CENTERS - World Cancer Centers
     ============================================================ -->

<link rel="stylesheet" href="../css/style.css" />
<section class="cancer-centers" id="cancer-centers">
    <div class="container">
        <!-- Section Header -->
        <div class="section-header">
            <h2>
                <i class="fas fa-hospital" style="color:#667eea;"></i>
                World Cancer Centers
            </h2>
            <p>
                Directory of over 300 leading cancer centers worldwide
                <br />
                <span style="font-size:14px;color:#a0aec0;">
                    Last Updated: <span id="centersUpdateDate">2025-07-26</span>
                </span>
            </p>
        </div>

        <!-- Search and Filter -->
        <div class="centers-search">
            <input 
                type="text" 
                id="centersSearch" 
                placeholder="🔍 Search center by name, country or specialty..."
                onkeyup="filterCenters()"
            />
            <select id="centersFilter" onchange="filterCenters()">
                <option value="all">🌍 All Countries</option>
                <option value="usa">🇺🇸 USA</option>
                <option value="uk">🇬🇧 United Kingdom</option>
                <option value="germany">🇩🇪 Germany</option>
                <option value="france">🇫🇷 France</option>
                <option value="canada">🇨🇦 Canada</option>
                <option value="japan">🇯🇵 Japan</option>
                <option value="australia">🇦🇺 Australia</option>
                <option value="other">🌏 Other Countries</option>
            </select>
            <button onclick="filterCenters()">
                <i class="fas fa-search"></i> Search
            </button>
        </div>

        <!-- Center Statistics -->
        <div style="text-align:center;margin-bottom:24px;">
            <span style="background:#edf2f7;padding:6px 20px;border-radius:20px;font-size:14px;color:#4a3f5c;">
                <i class="fas fa-building"></i>
                <span id="centersCount">302</span> Active Centers
            </span>
            <span style="background:#edf2f7;padding:6px 20px;border-radius:20px;font-size:14px;color:#4a3f5c;margin-right:8px;">
                <i class="fas fa-flask"></i>
                <span id="trialsCount">1,247</span> Clinical Trials
            </span>
        </div>

        <!-- Centers List -->
        <div class="centers-grid" id="centersGrid">
            <!-- Centers are built by JavaScript -->
        </div>

        <!-- View All Button -->
        <div class="kb-footer">
            <button class="btn-outline" onclick="showAllCenters()">
                <i class="fas fa-globe"></i> View All 300+ Centers
            </button>
            <button class="btn-outline" style="margin-right:12px;" onclick="suggestCenter()">
                <i class="fas fa-plus-circle"></i> Suggest New Center
            </button>
        </div>
    </div>
</section>

<!-- ============================================================
     🎯 Cancer Centers Scripts
     ============================================================ -->

<script>
    // ============================================================
    // 📊 Cancer Centers Data (Sample)
    // ============================================================

    const centersData = [
        {
            id: 1,
            name: "MD Anderson Cancer Center",
            country: "usa",
            flag: "🇺🇸",
            city: "Houston, Texas",
            specialties: ["Glioma", "Brain Tumors", "Precision Medicine", "Immunotherapy"],
            website: "https://www.mdanderson.org",
            activeTrials: 12,
            rank: 1,
            description: "One of the largest and most prestigious cancer centers worldwide, with a special focus on brain tumors"
        },
        {
            id: 2,
            name: "Memorial Sloan Kettering Cancer Center",
            country: "usa",
            flag: "🇺🇸",
            city: "New York",
            specialties: ["Neuro-oncology", "Immunotherapy", "Genomics", "Clinical Trials"],
            website: "https://www.mskcc.org",
            activeTrials: 8,
            rank: 2,
            description: "Leading center in glioma research and targeted therapies"
        },
        {
            id: 3,
            name: "Dana-Farber Cancer Institute",
            country: "usa",
            flag: "🇺🇸",
            city: "Boston",
            specialties: ["Glioblastoma", "Cancer Genetics", "Personalized Medicine"],
            website: "https://www.dana-farber.org",
            activeTrials: 10,
            rank: 3,
            description: "Top center for genetic research and innovative glioma treatments"
        },
        {
            id: 4,
            name: "Institut Gustave Roussy",
            country: "france",
            flag: "🇫🇷",
            city: "Paris",
            specialties: ["Brain Tumors", "Clinical Trials", "Precision Oncology"],
            website: "https://www.gustaveroussy.fr",
            activeTrials: 6,
            rank: 4,
            description: "Europe's largest cancer center with a specialized glioma team"
        },
        {
            id: 5,
            name: "German Cancer Research Center (DKFZ)",
            country: "germany",
            flag: "🇩🇪",
            city: "Heidelberg",
            specialties: ["Basic Research", "Epigenetics", "Molecular Imaging"],
            website: "https://www.dkfz.de",
            activeTrials: 7,
            rank: 5,
            description: "Leading center in basic research and glioma epigenetics"
        },
        {
            id: 6,
            name: "Princess Margaret Cancer Centre",
            country: "canada",
            flag: "🇨🇦",
            city: "Toronto",
            specialties: ["Neuro-oncology", "Radiotherapy", "Clinical Research"],
            website: "https://www.uhn.ca/PrincessMargaret",
            activeTrials: 5,
            rank: 6,
            description: "Canada's top center for glioma treatment and research"
        },
        {
            id: 7,
            name: "National Cancer Center Japan",
            country: "japan",
            flag: "🇯🇵",
            city: "Tokyo",
            specialties: ["Glioma", "Nuclear Medicine", "Brain Surgery"],
            website: "https://www.ncc.go.jp",
            activeTrials: 4,
            rank: 7,
            description: "Leading center for advanced surgery and innovative treatments in Asia"
        },
        {
            id: 8,
            name: "Peter MacCallum Cancer Centre",
            country: "australia",
            flag: "🇦🇺",
            city: "Melbourne",
            specialties: ["Immunotherapy", "Cancer Genomics", "Clinical Trials"],
            website: "https://www.petermac.org",
            activeTrials: 3,
            rank: 8,
            description: "Australia's premier center for glioma research"
        }
    ];

    // ============================================================
    // 🎯 Center Functions
    // ============================================================

    let currentCenters = [...centersData];

    /**
     * Render centers on the page
     */
    function renderCenters(centers) {
        const grid = document.getElementById('centersGrid');
        
        if (!centers || centers.length === 0) {
            grid.innerHTML = `
                <div style="grid-column:1/-1;text-align:center;padding:60px 20px;background:#f7fafc;border-radius:20px;">
                    <i class="fas fa-search" style="font-size:48px;color:#a0aec0;display:block;margin-bottom:16px;"></i>
                    <h3 style="color:#4a3f5c;">No centers found</h3>
                    <p style="color:#a0aec0;">Please adjust your search criteria.</p>
                </div>
            `;
            return;
        }

        grid.innerHTML = centers.map(center => `
            <div class="center-card" data-country="${center.country}">
                <div style="display:flex;justify-content:space-between;align-items:start;">
                    <div>
                        <div class="name">
                            ${center.flag} ${center.name}
                        </div>
                        <div class="country">
                            <i class="fas fa-map-pin"></i> ${center.city}
                        </div>
                    </div>
                    <span style="background:#667eea;color:#fff;padding:2px 12px;border-radius:20px;font-size:12px;font-weight:600;">
                        #${center.rank}
                    </span>
                </div>
                
                <p style="font-size:13px;color:#718096;margin:8px 0 12px;line-height:1.6;">
                    ${center.description}
                </p>
                
                <div class="tags">
                    ${center.specialties.map(s => `<span>${s}</span>`).join('')}
                    <span style="background:#48bb78;color:#fff;">
                        <i class="fas fa-flask"></i> ${center.activeTrials} Trials
                    </span>
                </div>
                
                <div style="margin-top:12px;display:flex;gap:8px;">
                    <a href="${center.website}" target="_blank" style="
                        background:#edf2f7;
                        padding:4px 16px;
                        border-radius:20px;
                        font-size:13px;
                        color:#4a3f5c;
                        transition:all 0.3s;
                        text-decoration:none;
                    " onmouseover="this.style.background='#667eea';this.style.color='#fff'" 
                       onmouseout="this.style.background='#edf2f7';this.style.color='#4a3f5c'">
                        <i class="fas fa-external-link-alt"></i> Website
                    </a>
                    <button onclick="showCenterDetail(${center.id})" style="
                        background:transparent;
                        border:1px solid #667eea;
                        color:#667eea;
                        padding:4px 16px;
                        border-radius:20px;
                        font-size:13px;
                        cursor:pointer;
                        transition:all 0.3s;
                        font-family:'Vazir',sans-serif;
                    " onmouseover="this.style.background='#667eea';this.style.color='#fff'" 
                       onmouseout="this.style.background='transparent';this.style.color='#667eea'">
                        <i class="fas fa-info-circle"></i> Details
                    </button>
                </div>
            </div>
        `).join('');

        // Update counts
        document.getElementById('centersCount').textContent = centers.length;
        document.getElementById('trialsCount').textContent = centers.reduce((sum, c) => sum + c.activeTrials, 0);
    }

    /**
     * Filter centers
     */
    function filterCenters() {
        const query = document.getElementById('centersSearch').value.toLowerCase().trim();
        const countryFilter = document.getElementById('centersFilter').value;

        let filtered = centersData.filter(center => {
            // Country filter
            if (countryFilter !== 'all' && center.country !== countryFilter) {
                return false;
            }

            // Search filter
            if (query) {
                const searchText = (center.name + ' ' + center.city + ' ' + center.specialties.join(' ') + ' ' + center.description).toLowerCase();
                return searchText.includes(query);
            }

            return true;
        });

        currentCenters = filtered;
        renderCenters(filtered);

        // Update count
        document.getElementById('centersCount').textContent = filtered.length;
    }

    /**
     * Show center details
     */
    function showCenterDetail(id) {
        const center = centersData.find(c => c.id === id);
        if (!center) return;

        const modalContent = `
            <div style="text-align:right;">
                <h2 style="font-size:24px;margin-bottom:8px;">${center.flag} ${center.name}</h2>
                <p style="color:#718096;margin-bottom:12px;">
                    <i class="fas fa-map-pin"></i> ${center.city}
                </p>
                <p style="margin-bottom:16px;line-height:1.8;">${center.description}</p>
                
                <div style="margin-bottom:16px;">
                    <strong style="display:block;margin-bottom:8px;">Specialties:</strong>
                    <div style="display:flex;flex-wrap:wrap;gap:6px;">
                        ${center.specialties.map(s => `
                            <span style="background:#edf2f7;padding:4px 16px;border-radius:20px;font-size:14px;">${s}</span>
                        `).join('')}
                    </div>
                </div>
                
                <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;">
                    <span style="background:#48bb78;color:#fff;padding:4px 16px;border-radius:20px;font-size:14px;">
                        <i class="fas fa-flask"></i> ${center.activeTrials} Active Trials
                    </span>
                    <span style="background:#667eea;color:#fff;padding:4px 16px;border-radius:20px;font-size:14px;">
                        <i class="fas fa-trophy"></i> Rank #${center.rank}
                    </span>
                </div>
                
                <a href="${center.website}" target="_blank" style="
                    display:inline-block;
                    background:linear-gradient(135deg,#667eea,#764ba2);
                    color:#fff;
                    padding:10px 32px;
                    border-radius:30px;
                    text-decoration:none;
                    font-weight:600;
                ">
                    <i class="fas fa-external-link-alt"></i> Visit Website
                </a>
            </div>
        `;

        showModal(`🏥 ${center.name}`, modalContent);
    }

    /**
     * Show all centers
     */
    function showAllCenters() {
        document.getElementById('centersSearch').value = '';
        document.getElementById('centersFilter').value = 'all';
        filterCenters();
        
        // Scroll to centers section
        document.getElementById('cancer-centers').scrollIntoView({ behavior: 'smooth' });
    }

    /**
     * Suggest new center
     */
    function suggestCenter() {
        const content = `
            <div style="text-align:right;">
                <p style="color:#718096;margin-bottom:16px;">
                    If you know of a cancer center not listed in our directory, please submit its information.
                </p>
                <form onsubmit="event.preventDefault();submitCenterSuggestion();">
                    <div style="margin-bottom:12px;">
                        <label style="display:block;font-weight:600;margin-bottom:4px;">Center Name:</label>
                        <input type="text" id="suggestName" placeholder="Enter center name" style="
                            width:100%;
                            padding:10px 16px;
                            border:2px solid #e2e8f0;
                            border-radius:12px;
                            font-size:15px;
                            font-family:'Vazir',sans-serif;
                            outline:none;
                        " onfocus="this.style.borderColor='#667eea'" onblur="this.style.borderColor='#e2e8f0'">
                    </div>
                    <div style="margin-bottom:12px;">
                        <label style="display:block;font-weight:600;margin-bottom:4px;">Country:</label>
                        <input type="text" id="suggestCountry" placeholder="Enter country" style="
                            width:100%;
                            padding:10px 16px;
                            border:2px solid #e2e8f0;
                            border-radius:12px;
                            font-size:15px;
                            font-family:'Vazir',sans-serif;
                            outline:none;
                        " onfocus="this.style.borderColor='#667eea'" onblur="this.style.borderColor='#e2e8f0'">
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="display:block;font-weight:600;margin-bottom:4px;">Website:</label>
                        <input type="url" id="suggestWebsite" placeholder="https://..." style="
                            width:100%;
                            padding:10px 16px;
                            border:2px solid #e2e8f0;
                            border-radius:12px;
                            font-size:15px;
                            font-family:'Vazir',sans-serif;
                            outline:none;
                        " onfocus="this.style.borderColor='#667eea'" onblur="this.style.borderColor='#e2e8f0'">
                    </div>
                    <button type="submit" style="
                        width:100%;
                        background:linear-gradient(135deg,#667eea,#764ba2);
                        color:#fff;
                        border:none;
                        padding:12px;
                        border-radius:12px;
                        font-size:16px;
                        font-weight:600;
                        cursor:pointer;
                        font-family:'Vazir',sans-serif;
                        transition:all 0.3s;
                    " onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'">
                        <i class="fas fa-paper-plane"></i> Submit Suggestion
                    </button>
                </form>
            </div>
        `;

        showModal('➕ Suggest New Center', content);
    }

    /**
     * Submit center suggestion (simulation)
     */
    function submitCenterSuggestion() {
        const name = document.getElementById('suggestName')?.value.trim();
        const country = document.getElementById('suggestCountry')?.value.trim();
        const website = document.getElementById('suggestWebsite')?.value.trim();

        if (!name) {
            alert('❌ Please enter the center name.');
            return;
        }

        // Close modal
        const modal = document.querySelector('div[style*="position: fixed"]');
        if (modal) modal.remove();

        alert(`✅ "${name}" has been successfully registered!\n\nThank you for your suggestion. It will be added to the directory after review.`);
    }

    // ============================================================
    // 🚀 Initial Load
    // ============================================================

    document.addEventListener('DOMContentLoaded', () => {
        // Update date
        const now = new Date();
        document.getElementById('centersUpdateDate').textContent = now.toLocaleDateString('en-US', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
        
        renderCenters(centersData);
    });
</script>
